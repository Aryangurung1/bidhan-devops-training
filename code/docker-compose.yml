services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: fellowship
      POSTGRES_PASSWORD: fellowship
      POSTGRES_DB: fellowship
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  backend1-a:
    build: ./backend1
    restart: always
    env_file: ./backend1/.env
    environment:
      PORT: 3000
      DB_HOST: postgres
    depends_on:
      - postgres
    networks:
      - app-network

  backend1-b:
    build: ./backend1
    restart: always
    env_file: ./backend1/.env
    environment:
      PORT: 3001
      DB_HOST: postgres
    depends_on:
      - postgres
    networks:
      - app-network

  backend2-a:
    build: ./backend2
    restart: always
    env_file: ./backend2/.env
    environment:
      PORT: 3002
      DB_HOST: postgres
    depends_on:
      - postgres
    networks:
      - app-network

  backend2-b:
    build: ./backend2
    restart: always
    env_file: ./backend2/.env
    environment:
      PORT: 3003
      DB_HOST: postgres
    depends_on:
      - postgres
    networks:
      - app-network

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:80"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend1-a
      - backend1-b
      - backend2-a
      - backend2-b
    networks:
      - app-network

  dozzle:
    image: amir20/dozzle:latest
    restart: always
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres-data:

networks:
  app-network:
