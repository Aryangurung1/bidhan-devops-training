services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fellowship
      POSTGRES_PASSWORD: fellowship
      POSTGRES_DB: fellowship
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend1-a
      - backend1-b
      - backend2-a
      - backend2-b

  frontend:
    build: ./frontend
    ports:
      - "5173:80"

  backend1-a:
    build: ./backend1
    env_file: ./backend1/.env
    environment:
      PORT: 3000
      DB_HOST: postgres
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  backend1-b:
    build: ./backend1
    env_file: ./backend1/.env
    environment:
      PORT: 3001
      DB_HOST: postgres
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  backend2-a:
    build: ./backend2
    env_file: ./backend2/.env
    environment:
      PORT: 3002
      DB_HOST: postgres
    ports:
      - "3002:3002"
    depends_on:
      - postgres

  backend2-b:
    build: ./backend2
    env_file: ./backend2/.env
    environment:
      PORT: 3003
      DB_HOST: postgres
    ports:
      - "3003:3003"
    depends_on:
      - postgres

volumes:
  postgres-data:
